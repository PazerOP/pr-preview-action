name: Deploy PR Preview
author: Ross Williams (PazerOP fork)
description: >
    Deploy a pull request preview to GitHub Pages, similar to Vercel and Netlify.
    Uses GitHub Actions artifact-based deployment (Pages source: "GitHub Actions").


branding:
    icon: git-pull-request
    color: yellow

inputs:
    token:
        description: >
            The token to use for the deployment. Default is GITHUB_TOKEN in the current repository.


        required: false
        default: ${{ github.token }}
    preview-branch:
        description: Branch on which the previews will be deployed.
        required: false
        default: gh-pages
    umbrella-dir:
        description: Path to the directory containing all previews.
        required: false
        default: pr-preview
    pages-base-url:
        description: URL of the repo's GitHub Pages site.
        required: false
        default: ""
    pages-base-path:
        description: Path that GitHub Pages is served from.
        required: false
        default: ""
    source-dir:
        description: Directory containing files to deploy.
        required: false
        default: .
    pr-number:
        description: >
            The PR number to use for the preview path. Defaults to the PR number from the GitHub event context.


        required: false
        default: ""
    comment:
        description: Whether to leave a sticky comment on the calling PR.
        required: false
        default: "true"
    qr-code:
        description: URL to a QR code provider, or "false" to disable.
        required: false
        default: "https://qr.rossjrw.com/?color.dark=0d1117&url="
    deploy-commit-message:
        description: The commit message to use when adding/updating a preview.
        required: false
        default: Deploy preview for PR ${{ github.event.number }} 🛫
    remove-commit-message:
        description: The commit message to use when removing a preview.
        required: false
        default: Remove preview for PR ${{ github.event.number }} 🛬
    action:
        description: >
            Determines what this action will do when it is executed. Supported values: `deploy`, `remove`, `auto` (default).


        required: false
        default: auto
    commit-status-context:
        description: The context string for commit statuses (e.g., shown as the status check name).
        required: false
        default: "Preview"

outputs:
    deployment-action:
        description: Resolved value of the 'action' input parameter (deploy, remove, none).
        value: ${{ steps.setup.outputs.deployment_action }}
    pages-base-url:
        description: What this Action thinks the base URL of the GitHub Pages site is.
        value: ${{ steps.setup.outputs.pages_base_url }}
    preview-url-path:
        description: Path to the preview from the Pages base URL.
        value: ${{ steps.setup.outputs.preview_url_path }}
    preview-url:
        description: Full URL to the preview.
        value: ${{ steps.setup.outputs.preview_url }}
    action-version:
        description: The version of this Action when it was run.
        value: ${{ steps.setup.outputs.action_version }}
    action-start-timestamp:
        description: The Unix timestamp that the action started.
        value: ${{ steps.setup.outputs.action_start_timestamp }}
    action-start-time:
        description: The time that the action started in a readable format (UTC).
        value: ${{ steps.setup.outputs.action_start_time }}

runs:
    using: composite
    steps:
        - name: Setup preview environment
          id: setup
          env:
              INPUT_ACTION: ${{ inputs.action }}
              INPUT_UMBRELLA_DIR: ${{ inputs.umbrella-dir }}
              INPUT_PAGES_BASE_URL: ${{ inputs.pages-base-url }}
              INPUT_PAGES_BASE_PATH: ${{ inputs.pages-base-path }}
              INPUT_PR_NUMBER: ${{ inputs.pr-number || github.event.number }}
              INPUT_ACTION_REF: ${{ github.action_ref || github.ref }}
          run: node $GITHUB_ACTION_PATH/dist/setup.js
          shell: bash

        # DEPLOYMENT

        - name: Set pending commit status
          if: env.deployment_action == 'deploy'
          env:
              INPUT_TOKEN: ${{ inputs.token }}
              INPUT_SHA: ${{ github.event.pull_request.head.sha }}
              INPUT_CONTEXT: ${{ inputs.commit-status-context }}
          run: node $GITHUB_ACTION_PATH/dist/status.js pending "Deploying preview..." "${{ env.preview_url }}"
          shell: bash

        - name: Deploy preview to branch
          if: env.deployment_action == 'deploy'
          env:
              INPUT_BRANCH: ${{ inputs.preview-branch }}
              INPUT_TOKEN: ${{ inputs.token }}
              INPUT_SOURCE_DIR: ${{ inputs.source-dir }}
              INPUT_TARGET_PATH: ${{ env.preview_file_path }}
              INPUT_COMMIT_MESSAGE: ${{ inputs.deploy-commit-message }}
          run: node $GITHUB_ACTION_PATH/dist/git-update.js deploy
          shell: bash

        - name: Upload Pages artifact
          if: env.deployment_action == 'deploy'
          uses: actions/upload-pages-artifact@v4
          with:
              path: __gh-pages-content

        - name: Deploy to GitHub Pages
          id: pages-deploy
          if: env.deployment_action == 'deploy'
          uses: actions/deploy-pages@v4

        - name: Set success commit status
          if: |
              env.deployment_action == 'deploy' &&
              steps.pages-deploy.outcome == 'success'
          env:
              INPUT_TOKEN: ${{ inputs.token }}
              INPUT_SHA: ${{ github.event.pull_request.head.sha }}
              INPUT_CONTEXT: ${{ inputs.commit-status-context }}
          run: node $GITHUB_ACTION_PATH/dist/status.js success "Preview is live!" "${{ env.preview_url }}"
          shell: bash

        - name: Post deploy comment
          if: |
              env.deployment_action == 'deploy' &&
              (inputs.comment == 'true' || inputs.comment == true) &&
              steps.pages-deploy.outcome == 'success'
          env:
              INPUT_TOKEN: ${{ inputs.token }}
              INPUT_PR_NUMBER: ${{ inputs.pr-number || github.event.number }}
              INPUT_PREVIEW_BRANCH: ${{ inputs.preview-branch }}
              INPUT_QR_CODE: ${{ inputs.qr-code }}
              INPUT_COMMENT: ${{ inputs.comment }}
          run: node $GITHUB_ACTION_PATH/dist/comment.js
          shell: bash

        - name: Set failure commit status
          if: |
              failure() &&
              env.deployment_action == 'deploy'
          env:
              INPUT_TOKEN: ${{ inputs.token }}
              INPUT_SHA: ${{ github.event.pull_request.head.sha }}
              INPUT_CONTEXT: ${{ inputs.commit-status-context }}
          run: node $GITHUB_ACTION_PATH/dist/status.js failure "Preview deployment failed" "${{ env.preview_url }}"
          shell: bash

        # REMOVAL

        - name: Remove preview from branch
          if: env.deployment_action == 'remove'
          env:
              INPUT_BRANCH: ${{ inputs.preview-branch }}
              INPUT_TOKEN: ${{ inputs.token }}
              INPUT_TARGET_PATH: ${{ env.preview_file_path }}
              INPUT_COMMIT_MESSAGE: ${{ inputs.remove-commit-message }}
          run: node $GITHUB_ACTION_PATH/dist/git-update.js remove
          shell: bash

        - name: Upload Pages artifact for removal
          if: env.deployment_action == 'remove'
          uses: actions/upload-pages-artifact@v4
          with:
              path: __gh-pages-content

        - name: Deploy removal to GitHub Pages
          id: pages-deploy-remove
          if: env.deployment_action == 'remove'
          uses: actions/deploy-pages@v4

        - name: Post remove comment
          if: |
              env.deployment_action == 'remove' &&
              (inputs.comment == 'true' || inputs.comment == true)
          env:
              INPUT_TOKEN: ${{ inputs.token }}
              INPUT_PR_NUMBER: ${{ inputs.pr-number || github.event.number }}
              INPUT_PREVIEW_BRANCH: ${{ inputs.preview-branch }}
              INPUT_QR_CODE: ${{ inputs.qr-code }}
              INPUT_COMMENT: ${{ inputs.comment }}
          run: node $GITHUB_ACTION_PATH/dist/comment.js
          shell: bash
