name: Deploy PR Preview

on:
    workflow_call:
        inputs:
            source-dir:
                description: Directory containing files to deploy. Required when artifact-name is not set.
                required: false
                type: string
                default: "."
            artifact-name:
                description: Name of a previously-uploaded artifact to use as the deploy source. When set, the sparse checkout of source-dir is skipped and the artifact is downloaded instead.
                required: false
                type: string
                default: ""
            preview-branch:
                description: Branch on which the previews will be deployed.
                type: string
                default: gh-pages
            umbrella-dir:
                description: Path to the directory containing all previews.
                type: string
                default: pr-preview
            pages-base-url:
                description: URL of the repo's GitHub Pages site.
                type: string
                default: ""
            pages-base-path:
                description: Path that GitHub Pages is served from.
                type: string
                default: ""
            pr-number:
                description: The PR number to use for the preview path. Defaults to the PR number from the GitHub event context.
                type: string
                default: ""
            comment:
                description: Whether to leave a sticky comment on the calling PR.
                type: boolean
                default: true
            action:
                description: "Determines what this workflow will do when it is executed. Supported values: deploy, auto (default). Cleanup of closed PR previews happens automatically during every deploy."
                type: string
                default: auto
            deploy-commit-message:
                description: The commit message to use when adding/updating a preview.
                type: string
                default: ""
            commit-status-context:
                description: The context string for commit statuses (e.g., shown as the status check name).
                type: string
                default: "Preview"
            shared-dirs:
                description: Comma-separated list of directory names that should be shared at the root level across all previews instead of duplicated into each PR subdirectory. During deploy, these directories are merged (additively) into the root of the gh-pages branch. During removal, unreferenced files in shared dirs are garbage-collected.
                required: false
                type: string
                default: ""
            deploy-to-pages:
                description: Whether to upload and deploy the Pages artifact. Set to false for git-only operations.
                type: boolean
                default: true
        outputs:
            deployment-action:
                description: Resolved action (deploy, remove, none).
                value: ${{ jobs.preview.outputs.deployment_action }}
            preview-url:
                description: Full URL to the preview.
                value: ${{ jobs.preview.outputs.preview_url }}

permissions:
    actions: read
    contents: write
    pull-requests: write
    pages: write
    id-token: write
    statuses: write

jobs:
    # FIFO deploy queue. GitHub's concurrency groups only hold 1 running +
    # 1 pending job per group; a third arrival bumps the pending one, causing
    # missed deploys. This job polls the API and waits for all older runs'
    # preview jobs to finish before releasing, so every invocation completes.
    # Cost: idle runner minutes during contention (~$0.24 per burst of 5).
    queue:
        runs-on: ubuntu-latest
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        steps:
            - name: Wait for deploy slot
              env:
                  GH_TOKEN: ${{ github.token }}
              shell: bash
              run: |
                  own_run=${{ github.run_id }}
                  repo="${{ github.repository }}"
                  deadline=$(( $(date +%s) + 1800 ))

                  while true; do
                      if [ "$(date +%s)" -ge "$deadline" ]; then
                          echo "::warning::Deploy queue timed out after 30m, proceeding"
                          break
                      fi

                      blocked=false
                      older_ids=$(gh api "repos/${repo}/actions/runs?per_page=100" \
                          --jq "[.workflow_runs[]
                              | select(.id < ${own_run})
                              | select(.status == \"in_progress\" or .status == \"queued\" or .status == \"waiting\")
                              | .id] | .[]" 2>/dev/null || true)

                      for run_id in $older_ids; do
                          active=$(gh api "repos/${repo}/actions/runs/${run_id}/jobs?per_page=100" \
                              --jq '[.jobs[]
                                  | select(.name | (endswith("/ preview") or endswith("/ queue")))
                                  | select(.status != "completed" and .status != "cancelled" and .status != "skipped")]
                                  | length' 2>/dev/null || echo "0")

                          if [ "${active}" -gt 0 ]; then
                              echo "Waiting: run ${run_id} has active preview job"
                              blocked=true
                              break
                          fi
                      done

                      if [ "$blocked" = "false" ]; then
                          echo "Deploy slot clear"
                          break
                      fi

                      sleep 10
                  done

    preview:
        needs: queue
        runs-on: ubuntu-latest
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        # Safety net: serializes deploys even if the queue logic has a bug.
        concurrency:
            group: pr-preview-action-${{ github.repository }}
            cancel-in-progress: false
        outputs:
            deployment_action: ${{ steps.setup.outputs.deployment_action }}
            preview_url: ${{ steps.setup.outputs.preview_url }}
        environment:
            name: github-pages
            url: ${{ steps.pages-deploy.outputs.page_url }}
        steps:
            - name: Validate inputs
              if: inputs.artifact-name != '' && inputs.source-dir != '.'
              run: |
                  echo "::error::Cannot specify both 'artifact-name' and 'source-dir'. Use one or the other."
                  exit 1
              shell: bash

            - name: Checkout caller repository
              if: inputs.artifact-name == ''
              uses: actions/checkout@v6
              with:
                  sparse-checkout: ${{ inputs.source-dir }}

            - name: Checkout action source
              uses: actions/checkout@v6
              with:
                  repository: PazerOP/pr-preview-action
                  ref: ${{ github.job_workflow_sha }}
                  path: .pr-preview-action

            - name: Install action dependencies
              run: npm install --prefix .pr-preview-action --omit=dev
              shell: bash

            - name: Setup preview environment
              id: setup
              env:
                  INPUT_ACTION: ${{ inputs.action }}
                  INPUT_UMBRELLA_DIR: ${{ inputs.umbrella-dir }}
                  INPUT_PAGES_BASE_URL: ${{ inputs.pages-base-url }}
                  INPUT_PAGES_BASE_PATH: ${{ inputs.pages-base-path }}
                  INPUT_PR_NUMBER: ${{ inputs.pr-number || github.event.number }}
                  INPUT_ACTION_REF: ${{ github.job_workflow_sha }}
                  GITHUB_SHA: ${{ github.sha }}
              run: node .pr-preview-action/dist/setup.js
              shell: bash

            - name: Download build artifact
              if: inputs.artifact-name != '' && env.deployment_action == 'deploy'
              uses: actions/download-artifact@v4
              with:
                  name: ${{ inputs.artifact-name }}
                  path: __artifact-download

            # DEPLOYMENT

            - name: Set pending commit status
              if: env.deployment_action == 'deploy' && github.event_name == 'pull_request'
              env:
                  INPUT_TOKEN: ${{ github.token }}
                  INPUT_SHA: ${{ github.event.pull_request.head.sha }}
                  INPUT_CONTEXT: ${{ inputs.commit-status-context }}
              run: node .pr-preview-action/dist/status.js pending "Deploying preview..." "${{ env.preview_url }}"
              shell: bash

            - name: Deploy preview to branch
              if: env.deployment_action == 'deploy'
              env:
                  INPUT_BRANCH: ${{ inputs.preview-branch }}
                  INPUT_TOKEN: ${{ github.token }}
                  INPUT_SOURCE_DIR: ${{ inputs.artifact-name != '' && '__artifact-download' || inputs.source-dir }}
                  INPUT_TARGET_PATH: ${{ env.preview_file_path }}
                  INPUT_UMBRELLA_DIR: ${{ inputs.umbrella-dir }}
                  INPUT_SHARED_DIRS: ${{ inputs.shared-dirs }}
                  INPUT_COMMIT_MESSAGE: ${{ inputs.deploy-commit-message || (github.event_name == 'pull_request' && format('Deploy preview for PR {0} 🛫', github.event.number)) || format('Deploy from {0}', github.sha) }}
              run: node .pr-preview-action/dist/git-update.js deploy
              shell: bash

            - name: Upload Pages artifact
              if: env.deployment_action == 'deploy' && inputs.deploy-to-pages
              uses: actions/upload-pages-artifact@v4
              with:
                  path: ${{ runner.temp }}/__gh-pages-content

            - name: Deploy to GitHub Pages
              id: pages-deploy
              if: env.deployment_action == 'deploy' && inputs.deploy-to-pages
              uses: actions/deploy-pages@v5

            - name: Set success commit status
              if: |
                  env.deployment_action == 'deploy' &&
                  github.event_name == 'pull_request' &&
                  (steps.pages-deploy.outcome == 'success' || steps.pages-deploy.outcome == 'skipped')
              env:
                  INPUT_TOKEN: ${{ github.token }}
                  INPUT_SHA: ${{ github.event.pull_request.head.sha }}
                  INPUT_CONTEXT: ${{ inputs.commit-status-context }}
              run: node .pr-preview-action/dist/status.js success "Preview is live!" "${{ env.preview_url }}"
              shell: bash

            - name: Post deploy comment
              if: |
                  env.deployment_action == 'deploy' &&
                  inputs.comment &&
                  github.event_name == 'pull_request' &&
                  (steps.pages-deploy.outcome == 'success' || steps.pages-deploy.outcome == 'skipped')
              env:
                  INPUT_TOKEN: ${{ github.token }}
                  INPUT_PR_NUMBER: ${{ inputs.pr-number || github.event.number }}
                  INPUT_PREVIEW_BRANCH: ${{ inputs.preview-branch }}
                  INPUT_COMMENT: "true"
              run: node .pr-preview-action/dist/comment.js
              shell: bash

            - name: Set failure commit status
              if: |
                  failure() &&
                  env.deployment_action == 'deploy' &&
                  github.event_name == 'pull_request'
              env:
                  INPUT_TOKEN: ${{ github.token }}
                  INPUT_SHA: ${{ github.event.pull_request.head.sha }}
                  INPUT_CONTEXT: ${{ inputs.commit-status-context }}
              run: node .pr-preview-action/dist/status.js failure "Preview deployment failed" "${{ env.preview_url }}"
              shell: bash

