name: Deploy PR Preview

on:
    workflow_call:
        inputs:
            source-dir:
                description: Directory containing files to deploy. Required when artifact-name is not set.
                required: false
                type: string
                default: "."
            artifact-name:
                description: Name of a previously-uploaded artifact to deploy instead of checking out source-dir.
                required: false
                type: string
                default: ""
            buildhost-server:
                description: Base URL of the buildhost server. Service subdomains (sites., dl., ...) are derived from this.
                required: false
                type: string
                default: "https://pazer.build"
            project:
                description: Buildhost project name. Defaults to the repository name (matching buildhost OIDC auto-provisioning).
                required: false
                type: string
                default: ""
            pr-number:
                description: PR number for the preview branch (pr-<number>). Defaults to the PR number from the event context.
                type: string
                default: ""
            comment:
                description: Whether to leave a sticky comment on the calling PR.
                type: boolean
                default: true
            action:
                description: "Determines what this workflow does. Supported values: deploy, remove, auto (default). auto deploys on opened/reopened/synchronize and removes the preview on closed."
                type: string
                default: auto
            commit-status-context:
                description: The context string for commit statuses (e.g., shown as the status check name).
                type: string
                default: "Preview"
        outputs:
            deployment-action:
                description: Resolved action (deploy, remove, none).
                value: ${{ jobs.preview.outputs.deployment_action }}
            preview-url:
                description: Full URL to the preview.
                value: ${{ jobs.preview.outputs.preview_url }}

# OIDC (id-token) lets the action authenticate to buildhost with no static
# secret; buildhost auto-provisions the project from the token's repo claim.
# pull-requests + statuses are for the sticky comment and commit statuses.
permissions:
    contents: read
    pull-requests: write
    statuses: write
    id-token: write

# Each PR (and each pushed branch) is an independent buildhost site branch, so
# unlike the old single gh-pages ref there is no shared mutable target to race.
# Serialize per preview branch and let a newer commit supersede an in-flight one.
concurrency:
    group: pr-preview-action-${{ github.repository }}-${{ inputs.pr-number || github.event.number || github.ref }}
    cancel-in-progress: true

jobs:
    preview:
        runs-on: ubuntu-latest
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        outputs:
            deployment_action: ${{ steps.setup.outputs.deployment_action }}
            preview_url: ${{ steps.setup.outputs.preview_url }}
        steps:
            - name: Validate inputs
              if: inputs.artifact-name != '' && inputs.source-dir != '.'
              run: |
                  echo "::error::Cannot specify both 'artifact-name' and 'source-dir'. Use one or the other."
                  exit 1
              shell: bash

            - name: Checkout action source
              uses: actions/checkout@v6
              with:
                  repository: PazerOP/pr-preview-action
                  ref: ${{ github.job_workflow_sha }}
                  path: .pr-preview-action

            - name: Install action dependencies
              run: npm install --prefix .pr-preview-action --omit=dev
              shell: bash

            - name: Setup preview environment
              id: setup
              env:
                  INPUT_ACTION: ${{ inputs.action }}
                  INPUT_BUILDHOST_SERVER: ${{ inputs.buildhost-server }}
                  INPUT_PROJECT: ${{ inputs.project }}
                  INPUT_PR_NUMBER: ${{ inputs.pr-number || github.event.number }}
                  INPUT_ACTION_REF: ${{ github.job_workflow_sha }}
                  GITHUB_SHA: ${{ github.sha }}
              run: node .pr-preview-action/dist/setup.js
              shell: bash

            # REMOVAL (PR closed)

            - name: Remove preview
              if: env.deployment_action == 'remove'
              env:
                  INPUT_TOKEN: ${{ secrets.BUILDHOST_TOKEN }}
              run: node .pr-preview-action/dist/cleanup.js
              shell: bash

            # DEPLOYMENT

            - name: Checkout caller repository
              if: env.deployment_action == 'deploy' && inputs.artifact-name == ''
              uses: actions/checkout@v6
              with:
                  sparse-checkout: ${{ inputs.source-dir }}
                  path: __caller

            - name: Download build artifact
              if: env.deployment_action == 'deploy' && inputs.artifact-name != ''
              uses: actions/download-artifact@v4
              with:
                  name: ${{ inputs.artifact-name }}
                  path: __artifact-download

            - name: Set pending commit status
              if: env.deployment_action == 'deploy' && github.event_name == 'pull_request'
              env:
                  INPUT_TOKEN: ${{ github.token }}
                  INPUT_SHA: ${{ github.event.pull_request.head.sha }}
                  INPUT_CONTEXT: ${{ inputs.commit-status-context }}
              run: node .pr-preview-action/dist/status.js pending "Deploying preview..." "${{ env.preview_url }}"
              shell: bash

            - name: Publish preview to buildhost
              if: env.deployment_action == 'deploy'
              env:
                  INPUT_TOKEN: ${{ secrets.BUILDHOST_TOKEN }}
                  INPUT_SOURCE_DIR: ${{ inputs.artifact-name != '' && '__artifact-download' || format('__caller/{0}', inputs.source-dir) }}
                  INPUT_GIT_COMMIT: ${{ github.event.pull_request.head.sha || github.sha }}
              run: node .pr-preview-action/dist/publish.js
              shell: bash

            - name: Set success commit status
              if: env.deployment_action == 'deploy' && github.event_name == 'pull_request'
              env:
                  INPUT_TOKEN: ${{ github.token }}
                  INPUT_SHA: ${{ github.event.pull_request.head.sha }}
                  INPUT_CONTEXT: ${{ inputs.commit-status-context }}
              run: node .pr-preview-action/dist/status.js success "Preview is live!" "${{ env.preview_url }}"
              shell: bash

            - name: Post deploy comment
              if: |
                  env.deployment_action == 'deploy' &&
                  inputs.comment &&
                  github.event_name == 'pull_request'
              env:
                  INPUT_TOKEN: ${{ github.token }}
                  INPUT_PR_NUMBER: ${{ inputs.pr-number || github.event.number }}
                  INPUT_COMMENT: "true"
              run: node .pr-preview-action/dist/comment.js
              shell: bash

            - name: Set failure commit status
              if: |
                  failure() &&
                  env.deployment_action == 'deploy' &&
                  github.event_name == 'pull_request'
              env:
                  INPUT_TOKEN: ${{ github.token }}
                  INPUT_SHA: ${{ github.event.pull_request.head.sha }}
                  INPUT_CONTEXT: ${{ inputs.commit-status-context }}
              run: node .pr-preview-action/dist/status.js failure "Preview deployment failed" "${{ env.preview_url }}"
              shell: bash
