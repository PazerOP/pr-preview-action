name: Deploy PR Preview (buildhost)

# Thin reusable workflow: deploy a PR preview to buildhost static sites by
# reusing buildhost's own buildhost-publish-site action. For the GitHub Pages
# flavour, use pr-preview-action-ghp.yml instead.

on:
    workflow_call:
        inputs:
            source-dir:
                description: Directory containing files to deploy. Required when artifact-name is not set.
                required: false
                type: string
                default: "."
            artifact-name:
                description: Name of a previously-uploaded artifact to deploy instead of checking out source-dir.
                required: false
                type: string
                default: ""
            buildhost-server:
                description: Base URL of the buildhost server.
                required: false
                type: string
                default: "https://pazer.build"
            project:
                description: Buildhost project name. Defaults to the repository name (buildhost OIDC auto-provisioning).
                required: false
                type: string
                default: ""
            pr-number:
                description: PR number for the preview branch (pr-<number>). Defaults to the event PR number.
                required: false
                type: string
                default: ""
            comment:
                description: Whether to leave a sticky comment on the PR with the preview URL.
                required: false
                type: boolean
                default: true
            public:
                description: Serve the preview publicly even when the source repo is private, so the preview URL works without a token. Set false to keep previews gated behind buildhost auth.
                required: false
                type: boolean
                default: true
        outputs:
            preview-url:
                description: URL of the deployed preview.
                value: ${{ jobs.preview.outputs.preview_url }}

# id-token lets buildhost-publish-site authenticate to buildhost via OIDC (no
# static secret); pull-requests is for the sticky comment. actions: read is
# needed when artifact-name is used -- buildhost-publish-site downloads the
# named artifact through the Actions REST API (listWorkflowRunArtifacts +
# downloadArtifact), which both require it.
permissions:
    contents: read
    actions: read
    pull-requests: write
    id-token: write

# Each PR/branch is an independent buildhost site branch, so serialize per
# preview branch and let a newer commit supersede an in-flight one.
concurrency:
    group: pr-preview-buildhost-${{ github.repository }}-${{ inputs.pr-number || github.event.number || github.ref }}
    cancel-in-progress: true

jobs:
    preview:
        runs-on: ubuntu-latest
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        outputs:
            preview_url: ${{ steps.publish.outputs.site_url }}
        steps:
            - name: Validate inputs
              if: inputs.artifact-name != '' && inputs.source-dir != '.'
              run: |
                  echo "::error::Cannot specify both 'artifact-name' and 'source-dir'. Use one or the other."
                  exit 1
              shell: bash

            - name: Checkout caller repository
              if: inputs.artifact-name == ''
              uses: actions/checkout@v6
              with:
                  sparse-checkout: ${{ inputs.source-dir }}
                  path: __caller

            # Reuse buildhost's own publish-site action for the upload (tar.gz
            # PUT to sites.<domain>/<project>/branch/<branch>, OIDC auth, project
            # auto-provisioned from the repo).
            - name: Publish preview to buildhost
              id: publish
              uses: wow-look-at-my/buildhost/.github/actions/buildhost-publish-site@master
              with:
                  server: ${{ inputs.buildhost-server }}
                  project: ${{ inputs.project }}
                  branch: ${{ inputs.pr-number && format('pr-{0}', inputs.pr-number) || github.event.number && format('pr-{0}', github.event.number) || github.ref_name }}
                  source_dir: ${{ inputs.artifact-name == '' && format('__caller/{0}', inputs.source-dir) || '' }}
                  artifact_name: ${{ inputs.artifact-name }}
                  public: ${{ inputs.public }}

            - name: Comment preview URL
              if: inputs.comment && github.event_name == 'pull_request'
              uses: wow-look-at-my/actions@typescript#latest
              env:
                  GITHUB_TOKEN: ${{ github.token }}
                  PREVIEW_URL: ${{ steps.publish.outputs.site_url }}
              with:
                  script: |
                      const url: string = process.env.PREVIEW_URL ?? "";
                      const marker = "<!-- pr-preview-buildhost -->";
                      const body = `${marker}\n:rocket: **Preview deployed to buildhost**\n\n${url}`;
                      const { owner, repo } = context.repo;
                      const issue_number = context.issue.number;
                      const comments = await octokit.paginate(octokit.rest.issues.listComments, { owner, repo, issue_number });
                      const existing = comments.find((c: any) => c.body && c.body.includes(marker));
                      if (existing) {
                          await octokit.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
                      } else {
                          await octokit.rest.issues.createComment({ owner, repo, issue_number, body });
                      }
