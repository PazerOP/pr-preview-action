name: Integration Tests

on:
    workflow_call:
        inputs:
            ref:
                description: "Git ref to checkout"
                required: true
                type: string
            sha:
                description: "Git SHA for the commit"
                required: true
                type: string
        secrets:
            test-deploy-token:
                description: "GitHub token for test deployments"
                required: true

jobs:
    test-git-lifecycle:
        name: "[Git] Lifecycle"
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
            pages: write
            id-token: write
        env:
            TEST_ID: test-git-lifecycle
            TEST_UMBRELLA_DIR: pr-preview-run-${{ github.run_id }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  ref: ${{ inputs.sha }}

            - name: Modify fixture
              run: sed -i.bak 's/<p id="testid">.*<\/p>/<p id="testid">${{ env.TEST_ID }}-INITIALISED<\/p>/' test/fixtures/html/index.html

            - name: Deploy
              env:
                  INPUT_ACTION: deploy
                  INPUT_UMBRELLA_DIR: ${{ env.TEST_UMBRELLA_DIR }}
                  INPUT_PR_NUMBER: ${{ env.TEST_ID }}
                  INPUT_BRANCH: ${{ env.TEST_ID }}
                  INPUT_TOKEN: ${{ secrets.test-deploy-token }}
                  INPUT_SOURCE_DIR: test/fixtures/html
                  INPUT_COMMIT_MESSAGE: deploy ${{ env.TEST_ID }} ${{ github.run_id }}
                  INPUT_COMMENT: "false"
              run: bash test/lib/run-preview.sh

            - name: Verify deployed
              env:
                  GITHUB_TOKEN: ${{ secrets.test-deploy-token }}
                  DEPLOY_REPO: ${{ github.repository }}
                  PREVIEW_BRANCH: ${{ env.TEST_ID }}
                  UMBRELLA_DIR: ${{ env.TEST_UMBRELLA_DIR }}
              run: bash test/integration/test-git-lifecycle.sh "deployed" "${{ env.TEST_ID }}-INITIALISED"

            - name: Modify fixture
              run: sed -i.bak 's/<p id="testid">.*<\/p>/<p id="testid">${{ env.TEST_ID }}-REDEPLOYED<\/p>/' test/fixtures/html/index.html

            - name: Redeploy
              env:
                  INPUT_ACTION: deploy
                  INPUT_UMBRELLA_DIR: ${{ env.TEST_UMBRELLA_DIR }}
                  INPUT_PR_NUMBER: ${{ env.TEST_ID }}
                  INPUT_BRANCH: ${{ env.TEST_ID }}
                  INPUT_TOKEN: ${{ secrets.test-deploy-token }}
                  INPUT_SOURCE_DIR: test/fixtures/html
                  INPUT_COMMIT_MESSAGE: deploy ${{ env.TEST_ID }} ${{ github.run_id }}
                  INPUT_COMMENT: "false"
              run: bash test/lib/run-preview.sh

            - name: Verify redeployed
              env:
                  GITHUB_TOKEN: ${{ secrets.test-deploy-token }}
                  DEPLOY_REPO: ${{ github.repository }}
                  PREVIEW_BRANCH: ${{ env.TEST_ID }}
                  UMBRELLA_DIR: ${{ env.TEST_UMBRELLA_DIR }}
              run: bash test/integration/test-git-lifecycle.sh "deployed" "${{ env.TEST_ID }}-REDEPLOYED"

            - name: Remove
              env:
                  INPUT_ACTION: remove
                  INPUT_UMBRELLA_DIR: ${{ env.TEST_UMBRELLA_DIR }}
                  INPUT_PR_NUMBER: ${{ env.TEST_ID }}
                  INPUT_BRANCH: ${{ env.TEST_ID }}
                  INPUT_TOKEN: ${{ secrets.test-deploy-token }}
                  INPUT_COMMIT_MESSAGE: remove ${{ env.TEST_ID }} ${{ github.run_id }}
                  INPUT_COMMENT: "false"
              run: bash test/lib/run-preview.sh

            - name: Verify removed
              env:
                  GITHUB_TOKEN: ${{ secrets.test-deploy-token }}
                  DEPLOY_REPO: ${{ github.repository }}
                  PREVIEW_BRANCH: ${{ env.TEST_ID }}
                  UMBRELLA_DIR: ${{ env.TEST_UMBRELLA_DIR }}
              run: bash test/integration/test-git-lifecycle.sh "removed"

            - name: Cleanup
              if: failure()
              run: |
                  echo "Action removal failed or was incomplete, performing manual cleanup..."
                  source test/lib/cleanup-test-deployment.sh
                  cleanup_deployment "${{ github.repository }}" "${{ env.TEST_ID }}" "${{ secrets.test-deploy-token }}" "${{ env.TEST_UMBRELLA_DIR }}"

    test-git-custom-umbrella:
        name: "[Git] Custom umbrella"
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
            pages: write
            id-token: write
        env:
            TEST_ID: test-git-custom-umbrella
            TEST_UMBRELLA_DIR: pr-preview-run-${{ github.run_id }}
            CUSTOM_UMBRELLA_DIR: custom-previews-run-${{ github.run_id }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  ref: ${{ inputs.sha }}

            - name: Modify fixture
              run: sed -i 's/<p id="testid">.*<\/p>/<p id="testid">${{ env.TEST_ID }}<\/p>/' test/fixtures/html/index.html

            - name: Deploy
              env:
                  INPUT_ACTION: deploy
                  INPUT_UMBRELLA_DIR: ${{ env.CUSTOM_UMBRELLA_DIR }}
                  INPUT_PR_NUMBER: ${{ env.TEST_ID }}
                  INPUT_BRANCH: ${{ env.TEST_ID }}
                  INPUT_TOKEN: ${{ secrets.test-deploy-token }}
                  INPUT_SOURCE_DIR: test/fixtures/html
                  INPUT_COMMIT_MESSAGE: deploy ${{ env.TEST_ID }} ${{ github.run_id }}
                  INPUT_COMMENT: "false"
              run: bash test/lib/run-preview.sh

            - name: Verify
              env:
                  GITHUB_TOKEN: ${{ secrets.test-deploy-token }}
                  DEPLOY_REPO: ${{ github.repository }}
                  PREVIEW_BRANCH: ${{ env.TEST_ID }}
                  TEST_UMBRELLA_DIR: ${{ env.TEST_UMBRELLA_DIR }}
                  CUSTOM_UMBRELLA_DIR: ${{ env.CUSTOM_UMBRELLA_DIR }}
              run: bash test/integration/test-git-custom-umbrella.sh

            - name: Cleanup
              if: always()
              run: |
                  source test/lib/cleanup-test-deployment.sh
                  cleanup_deployment "${{ github.repository }}" "${{ env.TEST_ID }}" "${{ secrets.test-deploy-token }}" "${{ env.TEST_UMBRELLA_DIR }}" "${{ env.CUSTOM_UMBRELLA_DIR }}"

    test-git-concurrent:
        name: "[Git] Concurrency"
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
            pages: write
            id-token: write
        env:
            TEST_ID: test-git-concurrent
            TEST_UMBRELLA_DIR: pr-preview-run-${{ github.run_id }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  ref: ${{ inputs.sha }}

            - name: Modify fixture
              run: sed -i.bak 's/<p id="testid">.*<\/p>/<p id="testid">${{ env.TEST_ID }}-1<\/p>/' test/fixtures/html/index.html

            - name: Deploy PR 1
              env:
                  INPUT_ACTION: deploy
                  INPUT_UMBRELLA_DIR: ${{ env.TEST_UMBRELLA_DIR }}
                  INPUT_PR_NUMBER: ${{ env.TEST_ID }}-1
                  INPUT_BRANCH: ${{ env.TEST_ID }}
                  INPUT_TOKEN: ${{ secrets.test-deploy-token }}
                  INPUT_SOURCE_DIR: test/fixtures/html
                  INPUT_COMMIT_MESSAGE: deploy ${{ env.TEST_ID }} ${{ github.run_id }}
                  INPUT_COMMENT: "false"
              run: bash test/lib/run-preview.sh

            - name: Modify fixture
              run: sed -i.bak 's/<p id="testid">.*<\/p>/<p id="testid">${{ env.TEST_ID }}-2<\/p>/' test/fixtures/html/index.html

            - name: Deploy PR 2
              env:
                  INPUT_ACTION: deploy
                  INPUT_UMBRELLA_DIR: ${{ env.TEST_UMBRELLA_DIR }}
                  INPUT_PR_NUMBER: ${{ env.TEST_ID }}-2
                  INPUT_BRANCH: ${{ env.TEST_ID }}
                  INPUT_TOKEN: ${{ secrets.test-deploy-token }}
                  INPUT_SOURCE_DIR: test/fixtures/html
                  INPUT_COMMIT_MESSAGE: deploy ${{ env.TEST_ID }} ${{ github.run_id }}
                  INPUT_COMMENT: "false"
              run: bash test/lib/run-preview.sh

            - name: Modify fixture
              run: sed -i.bak 's/<p id="testid">.*<\/p>/<p id="testid">${{ env.TEST_ID }}-2-redeployed<\/p>/' test/fixtures/html/index.html

            - name: Deploy PR 2 (again)
              env:
                  INPUT_ACTION: deploy
                  INPUT_UMBRELLA_DIR: ${{ env.TEST_UMBRELLA_DIR }}
                  INPUT_PR_NUMBER: ${{ env.TEST_ID }}-2
                  INPUT_BRANCH: ${{ env.TEST_ID }}
                  INPUT_TOKEN: ${{ secrets.test-deploy-token }}
                  INPUT_SOURCE_DIR: test/fixtures/html
                  INPUT_COMMIT_MESSAGE: deploy ${{ env.TEST_ID }} ${{ github.run_id }}
                  INPUT_COMMENT: "false"
              run: bash test/lib/run-preview.sh

            - name: Verify
              env:
                  GITHUB_TOKEN: ${{ secrets.test-deploy-token }}
                  DEPLOY_REPO: ${{ github.repository }}
                  PREVIEW_BRANCH: ${{ env.TEST_ID }}
                  UMBRELLA_DIR: ${{ env.TEST_UMBRELLA_DIR }}
              run: bash test/integration/test-git-concurrent.sh

            - name: Cleanup
              if: always()
              run: |
                  source test/lib/cleanup-test-deployment.sh
                  cleanup_deployment "${{ github.repository }}" "${{ env.TEST_ID }}" "${{ secrets.test-deploy-token }}" "${{ env.TEST_UMBRELLA_DIR }}"

    test-pages-lifecycle:
        name: "[Pages] Lifecycle"
        needs:
            [test-git-custom-umbrella, test-git-lifecycle, test-git-concurrent]
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
            pages: write
            id-token: write
        env:
            TEST_ID: test-pages-lifecycle
            TEST_UMBRELLA_DIR: pr-preview-run-${{ github.run_id }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  ref: ${{ inputs.sha }}

            - name: Modify fixture
              run: sed -i.bak 's/<p id="testid">.*<\/p>/<p id="testid">${{ env.TEST_ID }}<\/p>/' test/fixtures/html/index.html

            - name: Deploy
              env:
                  INPUT_ACTION: deploy
                  INPUT_UMBRELLA_DIR: ${{ env.TEST_UMBRELLA_DIR }}
                  INPUT_PR_NUMBER: ${{ env.TEST_ID }}
                  INPUT_BRANCH: main
                  INPUT_TOKEN: ${{ secrets.test-deploy-token }}
                  INPUT_SOURCE_DIR: test/fixtures/html
                  INPUT_COMMIT_MESSAGE: deploy ${{ env.TEST_ID }} ${{ github.run_id }}
                  INPUT_COMMENT: "false"
              run: bash test/lib/run-preview.sh

            - name: Verify
              env:
                  GITHUB_TOKEN: ${{ secrets.test-deploy-token }}
                  DEPLOY_REPO: ${{ github.repository }}
                  PREVIEW_BRANCH: main
                  UMBRELLA_DIR: ${{ env.TEST_UMBRELLA_DIR }}
              run: bash test/integration/test-pages-lifecycle.sh "deployed"

            - name: Remove
              env:
                  INPUT_ACTION: remove
                  INPUT_UMBRELLA_DIR: ${{ env.TEST_UMBRELLA_DIR }}
                  INPUT_PR_NUMBER: ${{ env.TEST_ID }}
                  INPUT_BRANCH: main
                  INPUT_TOKEN: ${{ secrets.test-deploy-token }}
                  INPUT_COMMIT_MESSAGE: remove ${{ env.TEST_ID }} ${{ github.run_id }}
                  INPUT_COMMENT: "false"
              run: bash test/lib/run-preview.sh

            - name: Verify removed
              env:
                  GITHUB_TOKEN: ${{ secrets.test-deploy-token }}
                  DEPLOY_REPO: ${{ github.repository }}
                  PREVIEW_BRANCH: main
                  UMBRELLA_DIR: ${{ env.TEST_UMBRELLA_DIR }}
              run: bash test/integration/test-pages-lifecycle.sh "removed"

            - name: Cleanup
              if: failure()
              run: |
                  echo "Action removal failed or was incomplete, performing manual cleanup..."
                  source test/lib/cleanup-test-deployment.sh
                  cleanup_deployment "${{ github.repository }}" "${{ env.TEST_ID }}" "${{ secrets.test-deploy-token }}" "${{ env.TEST_UMBRELLA_DIR }}"
